<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found — LightYear Data</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="/assets/favicon-32.png">
<style>
  :root{--navy:#1F3A5F;--navy-700:#152a45;--accent:#EDA100}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:linear-gradient(160deg,var(--navy) 0%,var(--navy-700) 100%);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:28px;line-height:1.55}
  h1{font-size:44px;font-weight:800;letter-spacing:-.02em;margin-bottom:12px}
  p{color:#cdd8e6;font-size:17px;margin-bottom:26px}
  a.btn{display:inline-block;padding:13px 26px;border-radius:9px;font-weight:700;font-size:15px;background:var(--accent);color:#3a2b00;text-decoration:none}
  a.btn:hover{filter:brightness(1.05)}
  .logo{font-weight:800;font-size:20px;letter-spacing:-.02em;margin-bottom:32px}
  .logo span{color:var(--accent)}

/* === LYD refinement layer === */
/* ============================================================
   LIGHTYEAR DATA — DESIGN SYSTEM REFINEMENT LAYER v1
   Injected last so it refines the base styles via cascade order.
   Brand colors unchanged; depth comes only from navy-tinted
   shadow / gradient / opacity layers of the existing palette.
   ============================================================ */
:root{
  --mono:ui-monospace,"SF Mono","JetBrains Mono","Cascadia Code",Menlo,Consolas,monospace;
  /* navy-tinted elevation scale */
  --sh-1:0 1px 2px rgba(31,58,95,.05), 0 1px 1px rgba(31,58,95,.04);
  --sh-2:0 4px 12px rgba(31,58,95,.07);
  --sh-3:0 14px 34px rgba(31,58,95,.12);
  --sh-4:0 26px 60px rgba(31,58,95,.18);
  --ring:0 0 0 3px rgba(42,120,214,.14);
  --r-card:14px; --r-tile:8px; --r-btn:9px;
  --ease:cubic-bezier(.16,1,.3,1);
}

/* ---- Tabular-mono numerals: the "data-native" feel ---- */
.kpi .val,.dkpi .val,.dash-title,.hstat b,.chg,.dkpi .chg,.kpi .chg,
.price .setup,.arch .band,.dchart svg text,.dash svg text,
.hero-stats .hstat b{
  font-variant-numeric:tabular-nums;
  font-feature-settings:"tnum" 1,"cv01" 1;
}
.kpi .val,.dkpi .val{font-family:var(--mono);letter-spacing:-.02em}
.hstat b{font-family:var(--mono);letter-spacing:-.01em}
.price .setup{font-family:var(--mono)}

/* ---- Display typography: tighter, more deliberate ---- */
h1{letter-spacing:-.035em!important}
h2,h2.sec{letter-spacing:-.025em!important}
.eyebrow,.dim-tag,.vhead,.answers,.tn,.arch .tn{
  font-weight:800;
}
.eyebrow{color:#2f6bb0}

/* ---- Unified card system: one radius, one elevation, one motion ---- */
.dboard,.price,.bio,.arch,.peer,.rcard,.vcard,.hcard,.vcase,
.faq-item,.benefit-card,.form-box,.upgrade-box,.audit-steps,
.mission-box,.reassurance,.honest,.trust-line{
  border-radius:var(--r-card);
  box-shadow:var(--sh-1);
  transition:transform .35s var(--ease),box-shadow .35s var(--ease),border-color .35s var(--ease);
}
.dboard:hover,.bio:hover,.arch:hover,.peer:hover,.vcard:hover,
.benefit-card:hover,.faq-item:hover{
  transform:translateY(-4px);
  box-shadow:var(--sh-3);
  border-color:#cfd9e6;
}
.price:hover{transform:translateY(-4px);box-shadow:var(--sh-3)}
.price.feat{box-shadow:var(--sh-3)}
.price.feat:hover{box-shadow:var(--sh-4)}

/* ---- Inner tiles + delta chips ---- */
.kpi,.dkpi,.dchart{border-radius:var(--r-tile)}
.dkpi{position:relative;overflow:hidden}
.kpi{transition:background .3s var(--ease)}
/* delta indicators become tinted pill chips */
.chg{
  display:inline-flex;align-items:center;gap:3px;
  padding:1px 7px;border-radius:999px;line-height:1.5;
  width:fit-content;
}
.chg.up,.dkpi .chg.up,.kpi .chg.up{background:rgba(27,175,122,.14);color:#076046}
.chg.down,.dkpi .chg.down,.kpi .chg.down{background:rgba(192,57,43,.11);color:#98261c}
.chg.flat,.dkpi .chg.flat,.kpi .chg.flat{background:rgba(82,81,78,.10);color:#4a4946}

/* ---- Charts: soft shadows, receding gridlines, smoother strokes ---- */
.dchart svg rect,.dash svg rect{
  filter:drop-shadow(0 2px 3px rgba(31,58,95,.14));
}
.dchart svg polyline,.dash svg polyline{
  filter:drop-shadow(0 3px 5px rgba(42,120,214,.20));
  stroke-width:2.75;
}
/* gridlines / axes recede so data reads first */
.dchart svg line,.dash svg line{stroke:#eef1f5!important}
.dchart svg circle[fill="none"]{stroke:#eef1f5!important}

/* ---- Buttons: crisper, tactile ---- */
.btn{border-radius:var(--r-btn);transition:transform .18s var(--ease),box-shadow .18s var(--ease),filter .18s var(--ease),background .18s var(--ease)}
.btn-accent{box-shadow:0 6px 16px rgba(237,161,0,.24)}
.btn-accent:hover{box-shadow:0 10px 22px rgba(237,161,0,.30)}
.btn:active{transform:translateY(1px) scale(.99)}
a.btn:focus-visible,button.btn:focus-visible{outline:none;box-shadow:var(--ring)}

/* ---- Nav: animated underline on links ---- */
.nav-links a:not(.btn){position:relative}
.nav-links a:not(.btn)::after{
  content:"";position:absolute;left:0;right:100%;bottom:-6px;height:2px;
  background:var(--amber,#EDA100);border-radius:2px;
  transition:right .3s var(--ease);
}
.nav-links a:not(.btn):hover::after{right:0}

/* ---- Live badge: gentle pulse ---- */
.dash-live::before{animation:lyd-pulse 2s var(--ease) infinite}
@keyframes lyd-pulse{
  0%{box-shadow:0 0 0 0 rgba(12,163,12,.45)}
  70%{box-shadow:0 0 0 6px rgba(12,163,12,0)}
  100%{box-shadow:0 0 0 0 rgba(12,163,12,0)}
}

/* ---- Depth in navy sections: subtle instrument grid + glow ---- */
.hero,.final,.cta-final,.cta-final,.dash-top{position:relative}
.hero::before,.final::before,.cta-final::before{
  content:"";position:absolute;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(255,255,255,.028) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.028) 1px,transparent 1px),
    radial-gradient(1200px 400px at 78% -10%,rgba(42,120,214,.28),transparent 60%);
  background-size:34px 34px,34px 34px,100% 100%;
  mask-image:linear-gradient(180deg,#000,rgba(0,0,0,.35));
}
.hero>*,.final>*,.cta-final>*{position:relative;z-index:1}

/* premium showcase dashboard shadow (hero) */
.dash{box-shadow:0 30px 70px rgba(8,17,33,.42),0 4px 14px rgba(8,17,33,.28)!important}

/* ---- Section separation: hairline between plane and surface ---- */
.reality,.byvertical,.fdash,.deliver,.honesty,.vertproof,.bios,
.benefits-section,.faq-quick,.faq-section,.cmp-section{
  border-top:1px solid var(--line,#e6e8ec);
}

/* ---- Form polish ---- */
.form-group input,.form-group select,.form-group textarea{border-radius:var(--r-tile);transition:border-color .18s var(--ease),box-shadow .18s var(--ease)}
.step-num{box-shadow:0 6px 14px rgba(42,120,214,.28)}

/* ---- Comparison table: softer, more premium ---- */
.cmp-scroll{border-radius:var(--r-card);box-shadow:var(--sh-2)}
td.us{background:linear-gradient(180deg,#f2f8fe,#eaf3fd)}

/* ---- Pricing feature tile accent ---- */
.price .badge{box-shadow:0 6px 14px rgba(237,161,0,.28)}

/* ---- Accessibility: focus states everywhere ---- */
a:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{
  outline:2px solid #2A78D6;outline-offset:2px;
}

/* ---- Reduced motion: collapse all motion to static ---- */
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}
  .dboard:hover,.bio:hover,.arch:hover,.peer:hover,.vcard:hover,
  .benefit-card:hover,.faq-item:hover,.price:hover,.btn:active{transform:none}
}
</style>
</head>
<body>
<div>
  <div class="logo">LightYear<span>Data</span></div>
  <h1>This page doesn't exist.</h1>
  <p>The page you're looking for moved or never existed. A single source of truth is kind of our thing, so let's get you back to it.</p>
  <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
    <a class="btn" href="/audit">Get your free data audit →</a>
    <a class="btn" href="/pricing" style="background:transparent;border:1.5px solid rgba(255,255,255,.4);color:#fff">See pricing</a>
  </div>
  <div style="margin-top:20px"><a href="/" style="color:#cdd8e6;text-decoration:underline;font-size:14px">Back to the homepage</a></div>
</div>
</body>
</html>
